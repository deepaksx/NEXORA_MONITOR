services:
  - type: web
    name: nexora-monitor
    runtime: python
    pythonVersion: "3.12.7"
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REFRESH_SECONDS
        value: "15"
