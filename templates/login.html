<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexora Monitor — Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1220; color: #e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
        .card { background: #111a2e; border: 1px solid #1f2a44; border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
<div class="card p-8 w-full max-w-sm shadow-xl">
    <h1 class="text-2xl font-bold text-center mb-1">Nexora Monitor</h1>
    <p class="text-center text-xs text-slate-500 mb-6 tracking-widest uppercase">Sign in</p>
    {% if error %}
    <div class="mb-4 px-3 py-2 rounded bg-red-900/40 border border-red-700/60 text-red-300 text-sm">{{ error }}</div>
    {% endif %}
    {% if notice %}
    <div class="mb-4 px-3 py-2 rounded bg-amber-900/30 border border-amber-700/50 text-amber-300 text-sm">{{ notice }}</div>
    {% endif %}
    <form method="post" action="{{ base }}/login" class="space-y-4">
        {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
        <div>
            <label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-1">Username</label>
            <input name="username" autofocus required autocomplete="username"
                   class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-1">Password</label>
            <input name="password" type="password" required autocomplete="current-password"
                   class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-blue-500">
        </div>
        <button type="submit"
                class="w-full py-2.5 rounded bg-blue-600 text-white font-semibold hover:bg-blue-500">
            Sign in
        </button>
    </form>
    <p class="text-[10px] text-slate-600 text-center mt-6 tracking-widest">build {{ build_id or 'dev' }}</p>
</div>
</body>
</html>
